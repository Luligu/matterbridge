# Matterbridge — Bun-native test runner config v 1.0.0.

[test]
# Optional setup run before any test (env, global mocks):
# preload = ["./buntest/setup.ts"]

# Bun scans root for *.test.{js|jsx|ts|tsx} *_test.{js|jsx|ts|tsx} *.spec.{js|jsx|ts|tsx} *_spec.{js|jsx|ts|tsx}.
pathIgnorePatterns = [
  '**/.cache/',
  '**/apps/',
  '**/build/',
  '**/chip/',
  '**/coverage/',
  '**/dist/',
  '**/node_modules/',
  '**/screenshots/',
  '**/scripts/',
  '**/src/mock/',
  '**/temp/',
  '**/test/',
  '**/vendor/',
  '**/vitest/',
  '**/jest-utils/',
  '**/vitest-utils/',
  '**/matterNode*.test.ts',
  '**/backend*.test.ts',
  'buntest/bunMatterTest.test.ts',
  'buntest/repro/bun-rename-eperm.test.ts',
  'buntest/repro/bun-worker-exit-concurrent.test.ts',
  # 'packages/thread/buntest/*.test.ts',
  'packages/thread/buntest/threadsManagerthreads.test.ts',
  # 'packages/thread/buntest/threadsManager.concurrent.test.ts',
  'packages/thread/buntest/workerWrapper.realworker.test.ts',
  'packages/thread/buntest/workerWrapper.test.ts',
]

coveragePathIgnorePatterns = [
  '**/.cache/',
  '**/apps/',
  '**/build/',
  '**/chip/',
  '**/coverage/',
  '**/dist/',
  '**/node_modules/',
  '**/screenshots/',
  '**/scripts/',
  '**/src/mock/',
  '**/temp/',
  '**/vendor/',
  '**/vitest/**',
  '**/src/**/*.d.ts',
  '**/src/**/*.{spec,test}.{ts,mts,cts}',
]
coverage = true
coverageReporter = ['lcov', 'text']
coverageDir = "./coverage/bun"

# Exclude test files from coverage reports
coverageSkipTestFiles = true
# Don't use sourcemaps for coverage analysis
coverageIgnoreSourcemaps = true
