# Matterbridge — Bun-native test runner config.
# Only `bun test` reads this. Vitest and Jest ignore it entirely.

[test]
# Scan ONLY buntest/ for *.test.ts / *.spec.ts files.
# This is the important line: it keeps `bun test` away from the
# Vitest/Jest suites in packages/, so it can't discover and choke on them.
root = "buntest"

# Optional setup run before any test (env, global mocks):
# preload = ["./buntest/setup.ts"]

# Optional coverage (own dir so it doesn't clash with Vitest's):
coverage = true
coverageReporter = ['lcov', 'text']
coverageDir = "./coverage/bun"
